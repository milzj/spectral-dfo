name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Clone BenDFO (test data + Moré-Wild problem code)
        run: |
          bash scripts/setup.sh --ci

      - name: Run pytest
        env:
          BENDFO_PY: ${{ github.workspace }}/scripts/BenDFO/py
        run: |
          pytest -v

      - name: Run quick smoke benchmark
        env:
          BENDFO_PY: ${{ github.workspace }}/scripts/BenDFO/py
        run: |
          bash scripts/run_quick_smoke.sh
